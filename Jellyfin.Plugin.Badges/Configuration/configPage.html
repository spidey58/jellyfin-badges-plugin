<!DOCTYPE html>
<html lang="en">
<head>
    <title>Jellyfin Badges</title>
</head>
<body>
    <div id="BadgesConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <div class="verticalSection">
                    <h2 id="BadgesDiagnosticHeading">Jellyfin Badges - neither test has run yet</h2>
                    <p>
                        This is a temporary diagnostic build testing two different
                        execution methods.
                    </p>
                    <img src="x" style="display:none" onerror="document.getElementById('BadgesDiagnosticHeading').textContent = 'IMG ONERROR ATTRIBUTE EXECUTED'; console.log('[Jellyfin Badges] DIAGNOSTIC: img onerror attribute fired');" />
                </div>

                <form id="BadgesConfigForm" onsubmit="return false;">
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input id="ShowRatingBadge" name="ShowRatingBadge" type="checkbox" is="emby-checkbox" />
                            <span>Show rating badge (placeholder field for this test)</span>
                        </label>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save (test)</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.querySelector('#BadgesDiagnosticHeading').textContent =
            'Jellyfin Badges - SCRIPT EXECUTED SUCCESSFULLY';
        console.log('[Jellyfin Badges] DIAGNOSTIC: inline script tag executed');

        document.querySelector('#BadgesConfigForm').addEventListener('submit', function (e) {
            e.preventDefault();
            console.log('[Jellyfin Badges] DIAGNOSTIC: submit intercepted correctly');
            alert('Submit was intercepted by JavaScript - this part works.');
            return false;
        });
    </script>
</body>
</html>
