name: "Jellyfin Badges"
guid: "2c0f75c3-6aad-4003-95e3-0fd418279ac3"
version: "1.0.0.0"
targetAbi: "10.9.0.0"
framework: "net8.0"
overview: "Displays HDR/Dolby Vision, audio format, source, and rating badges on the detail page."
description: >
  Jellyfin Badges reads the media stream and rating data Jellyfin already
  has (populated from your NFO metadata) and renders logo-style badges for
  resolution, codec, HDR/Dolby Vision, audio format (Atmos, TrueHD, DTS:X),
  source (UHD Blu-ray, Blu-ray, WEB-DL), and community rating directly on
  the item detail page. No external API calls or API keys required.
category: "General"
owner: "spidey58"
artifacts:
  - "Jellyfin.Plugin.Badges.dll"
changelog: >
  - Initial release: resolution, codec, HDR/Dolby Vision, audio format,
    source, and rating badges on the detail page.
